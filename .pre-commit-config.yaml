repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [ --fix ]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^orders_master/
        args: ["--strict"]
        additional_dependencies: ["pandas-stubs", "types-PyYAML", "pydantic", "python-dotenv"]

  - repo: local
    hooks:
      - id: forbid-secrets
        name: Forbid Secrets
        entry: Cannot commit secrets.toml or .env files
        language: fail
        files: '(\.env|secrets\.toml)$'
        
      - id: forbid-print
        name: Forbid print() in domain
        entry: 'print\s*\('
        language: pygrep
        files: ^orders_master/.*\.py$
